<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>网盘系统 - 文件管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body data-page-title="navbar.title">
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-left">
            <span class="logo">☁️</span>
            <span class="navbar-title" data-i18n="navbar.title">网盘系统</span>
        </div>
        <div class="navbar-right">
            <button id="languageToggle" onclick="window.i18n && window.i18n.switchLanguage()">
                🌐 EN
            </button>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">👤</div>
                <span class="user-name" id="userName">用户</span>
            </div>
            <button class="navbar-btn logout-btn" onclick="logout()" data-i18n="navbar.logout">
                退出
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- 工具栏 -->
        <div class="toolbar">
            <button class="btn btn-success" onclick="uploadFile()" disabled id="uploadBtn" data-i18n="toolbar.upload">
                <span class="btn-icon">↑</span> <span>上传</span>
            </button>
            <button class="btn btn-success" onclick="batchUpload()" disabled id="batchUploadBtn" data-i18n="toolbar.batch.upload">
                <span class="btn-icon">⇑</span> <span>批量上传</span>
            </button>
            <button class="btn btn-primary" onclick="downloadFile()" disabled id="downloadBtn" data-i18n="toolbar.download">
                <span class="btn-icon">↓</span> <span>下载</span>
            </button>
            <button class="btn btn-primary" onclick="downloadSelected()" disabled id="batchDownloadBtn" data-i18n="toolbar.batch.download">
                <span class="btn-icon">⇓</span> <span>批量下载</span>
            </button>
            <button class="btn btn-warning" onclick="renameItem()" disabled id="renameBtn" data-i18n="toolbar.rename">
                <span class="btn-icon">✎</span> <span>重命名</span>
            </button>
            <button class="btn btn-danger" onclick="deleteItem()" disabled id="deleteBtn" data-i18n="toolbar.delete">
                <span class="btn-icon">×</span> <span>删除</span>
            </button>
            <button class="btn btn-info" onclick="createFolder()" disabled id="createFolderBtn" data-i18n="toolbar.create.folder">
                <span class="btn-icon">+</span> <span>新建文件夹</span>
            </button>
            <button class="btn btn-ghost" onclick="refreshList()" disabled id="refreshBtn" data-i18n="toolbar.refresh">
                <span class="btn-icon">↻</span> <span>刷新</span>
            </button>
            <button class="btn btn-ghost" onclick="selectAll()" disabled id="selectAllBtn" data-i18n="toolbar.select.all">
                <span class="btn-icon">☑</span> <span>全选</span>
            </button>
            <button class="btn btn-ghost" onclick="clearSelection()" disabled id="clearSelectionBtn" data-i18n="toolbar.clear.selection">
                <span class="btn-icon">☐</span> <span>取消</span>
            </button>
        </div>

        <!-- 导航区域 -->
        <div class="navigation">
            <button class="btn btn-ghost" onclick="goBack()" disabled id="backBtn" data-i18n="nav.back">
                ← 返回
            </button>
            <div class="nav-path">
                <span data-i18n="nav.current.path">当前位置</span>
                <span class="separator">/</span>
                <span id="currentPathDisplay">/</span>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h3 data-i18n="upload.area.title">拖拽文件到此处上传</h3>
            <p data-i18n="upload.area.subtitle">或点击上传按钮选择文件</p>
        </div>
        
        <!-- 文件列表 -->
        <div class="file-list-container">
            <table class="file-list" id="fileList">
                <thead>
                    <tr>
                        <th data-i18n="filelist.select">选择</th>
                        <th data-i18n="filelist.name">名称</th>
                        <th data-i18n="filelist.type">类型</th>
                        <th data-i18n="filelist.size">大小</th>
                        <th data-i18n="filelist.modified">修改时间</th>
                        <th data-i18n="filelist.actions">操作</th>
                    </tr>
                </thead>
                <tbody id="fileTableBody">
                    <!-- 文件列表将在这里动态生成 -->
                </tbody>
            </table>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="status-text" id="statusText" data-i18n="status.ready">就绪</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- 批量上传队列显示 -->
        <div id="uploadQueueContainer" class="upload-queue-container" style="display: none;">
            <h4 data-i18n="upload.queue.title">上传队列</h4>
            <div id="uploadQueue"></div>
            <div class="upload-queue-actions">
                <button class="btn btn-danger" onclick="clearUploadQueue()" id="clearQueueBtn" data-i18n="upload.queue.clear">清空队列</button>
                <button class="btn btn-warning" onclick="pauseUpload()" id="pauseBtn" style="display: none;" data-i18n="upload.queue.pause">暂停</button>
                <button class="btn btn-success" onclick="resumeUpload()" id="resumeBtn" style="display: none;" data-i18n="upload.queue.resume">继续</button>
                <span id="queueStatus" class="queue-status"></span>
            </div>
        </div>
    </div>

    <!-- 引入JavaScript模块 -->
    <script src="js/i18n-manager.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/ui-animations.js"></script>
    <script src="js/auth-manager.js"></script>
    <script src="js/file-manager.js"></script>
    <script src="js/upload-manager.js"></script>
    <script src="js/download-manager.js"></script>
    
    <script>
        // 全局函数绑定（用于HTML onclick事件）
        function uploadFile() { uploadManager.uploadFile(); }
        function batchUpload() { uploadManager.batchUpload(); }
        function downloadFile() { downloadManager.downloadFile(); }
        function downloadSelected() { downloadManager.downloadSelected(); }
        function renameItem() { fileManager.renameItem(); }
        function deleteItem() { fileManager.deleteItem(); }
        function createFolder() { fileManager.createFolder(); }
        function refreshList() { fileManager.refreshList(); }
        function selectAll() { fileManager.selectAll(); }
        function clearSelection() { fileManager.clearSelection(); }
        function goBack() { fileManager.goBack(); }
        function logout() { authManager.logout(); }
        
        // 批量上传队列管理
        function clearUploadQueue() { uploadManager.clearUploadQueue(); }
        function pauseUpload() { uploadManager.pauseUpload(); }
        function resumeUpload() { uploadManager.resumeUpload(); }
    </script>
</body>
</html>
